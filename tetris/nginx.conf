server {
    listen 8080;
    server_name _;

    sendfile off;
    aio off;

    root /usr/share/nginx/html;
    index index.html;

    # Serve .wasm with the correct MIME type
    types {
        text/html                 html htm;
        text/javascript           js;
        application/wasm          wasm;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
