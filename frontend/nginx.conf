server {
    listen 80;
    server_name _;

    sendfile off;
    aio off;

    # Docker internal DNS first, public DNS fallback (works in both local and Railway)
    resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Tetris microservice
    location = /tetris {
        return 301 /tetris/;
    }
    location /tetris/ {
        rewrite ^/tetris/(.*) /$1 break;
        proxy_pass http://${TETRIS_HOST}:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # Proxy API requests to backend service
    # BACKEND_URL: full URL (e.g. http://backend:3000 locally, https://xxx.railway.app in prod)
    # BACKEND_HOST: hostname only (for Host header and SSL SNI)
    location /api {
        set $backend ${BACKEND_URL};
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_name ${BACKEND_HOST};
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle HTML5 history mode routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
