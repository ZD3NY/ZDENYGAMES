services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-mydb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-alpine
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8026:8025"   # web UI to view caught emails

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-mydb}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-in-production}
      PEPPER: ${PEPPER:-change-me-pepper-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  email-service:
    build:
      context: ./email-service
      dockerfile: Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: zdenygamesorg@gmail.com
      SMTP_PASS: ${GMAIL_APP_PASSWORD}
      SMTP_FROM: zdenygamesorg@gmail.com
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started

  tetris:
    build:
      context: ./tetris
      dockerfile: Dockerfile

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-80}:80"
    environment:
      BACKEND_URL: http://backend:3000
      BACKEND_HOST: backend
      TETRIS_URL: http://tetris:8080
      TETRIS_HOST: tetris
    depends_on:
      - backend
      - tetris

volumes:
  postgres_data:
